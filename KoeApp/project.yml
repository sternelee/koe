name: Koe
options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  defaultConfig: Release

packages:
  KoeMLX:
    path: ../Packages/KoeMLX
  KoeAppleSpeech:
    path: ../Packages/KoeAppleSpeech
  KoeAppleTranslation:
    path: ../Packages/KoeAppleTranslation
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.4"

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: nz.owo.koe
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES

targetTemplates:
  KoeApp:
    type: application
    platform: macOS
    sources:
      - path: Koe
        excludes:
          - "*.entitlements"
          - "**/*Tests.m"
    settings:
      base:
        INFOPLIST_FILE: Koe/Info.plist
        CODE_SIGN_ENTITLEMENTS: Koe/Koe.entitlements
        PRODUCT_NAME: Koe
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../koe-core/target"
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../target/release"
        OTHER_LDFLAGS:
          - "-lkoe_core"
          - "-lc++"
          - "-lSystem"
          - "-lresolv"
          - "-framework Accelerate"
          - "-framework Security"
          - "-framework CoreFoundation"
          - "-framework UserNotifications"
          - "-framework SystemConfiguration"
        ENABLE_APP_SANDBOX: NO
        CLANG_ENABLE_OBJC_ARC: YES
    frameworks:
      - AVFoundation
      - AppKit
      - ApplicationServices
      - Carbon
      - CoreAudio
      - AudioToolbox
      - ServiceManagement
      - Speech
      - UserNotifications
      - sdk: libsqlite3.tbd

targets:
  Koe:
    templates:
      - KoeApp
    settings:
      base:
        SWIFT_VERSION: "5.9"
        APP_APPCAST_URL: "https://raw.githubusercontent.com/missuo/koe/main/docs/appcast.xml"
    dependencies:
      - package: KoeAppleSpeech
        product: KoeAppleSpeech
      - package: KoeAppleTranslation
        product: KoeAppleTranslation
      - package: Sparkle
        product: Sparkle
      - target: KoeVirtualMic
        embed: true
    preBuildScripts:
      - name: Build Rust Library
        script: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          command -v cmake >/dev/null || { echo "error: cmake is required to build Rust dependency audiopus_sys. Install it with: brew install cmake" >&2; exit 1; }
          cd "${SRCROOT}/.."
          RUST_TARGET="aarch64-apple-darwin"
          cargo build --manifest-path koe-core/Cargo.toml --release --target "$RUST_TARGET" --no-default-features --features "apple-speech,local-mt,kitten-onnx"
          mkdir -p "${SRCROOT}/../target/release"
          ln -sf "${SRCROOT}/../target/${RUST_TARGET}/release/libkoe_core.a" "${SRCROOT}/../target/release/libkoe_core.a"
        basedOnDependencyAnalysis: false

  Koe-MLX:
    templates:
      - KoeApp
    settings:
      base:
        SWIFT_VERSION: "5.9"
        APP_APPCAST_URL: "https://raw.githubusercontent.com/missuo/koe/main/docs/appcast-mlx.xml"
    dependencies:
      - package: KoeMLX
        product: KoeMLX
      - package: KoeAppleSpeech
        product: KoeAppleSpeech
      - package: KoeAppleTranslation
        product: KoeAppleTranslation
      - package: Sparkle
        product: Sparkle
      - target: KoeVirtualMic
        embed: true
    preBuildScripts:
      - name: Build Rust Library
        script: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          command -v cmake >/dev/null || { echo "error: cmake is required to build Rust dependency audiopus_sys. Install it with: brew install cmake" >&2; exit 1; }
          cd "${SRCROOT}/.."
          RUST_TARGET="aarch64-apple-darwin"
          cargo build --manifest-path koe-core/Cargo.toml --release --target "$RUST_TARGET"
          mkdir -p "${SRCROOT}/../target/release"
          ln -sf "${SRCROOT}/../target/${RUST_TARGET}/release/libkoe_core.a" "${SRCROOT}/../target/release/libkoe_core.a"
        basedOnDependencyAnalysis: false

  KoeLogicTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Koe/AppDelegate/SPAppDelegateLogicTests.m
      - path: Koe/Hotkey/SPHotkeyMonitor.m
      - path: Koe/History/SPHistoryManager.m
      - path: Koe/History/SPHistoryManagerTests.m
      - path: Koe/Clipboard/SPClipboardManager.m
      - path: Koe/Clipboard/SPClipboardRestorePolicy.m
      - path: Koe/Clipboard/SPClipboardRestorePolicyTests.m
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: nz.owo.koe.logic-tests
        CLANG_ENABLE_OBJC_ARC: YES
    frameworks:
      - XCTest
      - Foundation
      - sdk: libsqlite3.tbd

  KoeVirtualMic:
    type: bundle
    platform: macOS
    sources:
      - path: VirtualMicPlugin/Sources
    settings:
      base:
        PRODUCT_NAME: KoeVirtualMic
        PRODUCT_BUNDLE_IDENTIFIER: nz.owo.koe.virtual-mic-driver
        WRAPPER_EXTENSION: driver
        INFOPLIST_FILE: VirtualMicPlugin/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        GCC_PREFIX_HEADER: ""
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/VirtualMicPlugin/Sources"
        OTHER_LDFLAGS:
          - "-framework CoreAudio"
          - "-framework CoreFoundation"
          - "-lc++"
    frameworks:
      - CoreAudio
      - CoreFoundation
